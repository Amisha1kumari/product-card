<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT CARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="left">
            <img src="Cup.jpg" alt="Coffee mug">
        </div>
        <div class="right">
            <p class="category">COFFEE MUG</p>
            <h1>Cute Little Cup</h1>
            <p class="description">
                Coffee Mugs are designed to express emotions.
                These are acclaimed for their amazing designs
                & superior quality.
            </p>
            <div class="price">
                <span class="new-price">₹149</span>
                <span class="old-price">₹230</span>
            </div>
            <button>Add to cart</button>
        </div>
    </div>
    
</body>
</html>
